<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #333333;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        body.page-loaded {
            opacity: 1;
        }

        .navbar {
            border-bottom: 2px solid #ffb7df;
        }

        .nav-logo {
            color: #ff69b4;
            text-decoration: underline;
            text-decoration-color: #ffb7df;
        }

        .nav-search {
            background-color: #fff0f7;
            border: 2px solid #ffb7df;
            width: 40%;
        }

        .nav-search:focus {
            background-color: #fff0f7;
            border-color: #ff69b4;
            box-shadow: none;
        }

        .nav-filter {
            border: 2px solid #ffb7df;
            background-color: #fff0f7;
            color: #777777;
        }

        .nav-profile {
            width: 32px;
            height: 32px;
            background-color: #ffb0fa;
        }

        .announcement-board {
            background-color: #fff0f7;
            border: 2px solid #ffb7df;
            padding: 40px 20px;
        }

        .announcement-board h2 {
            color: #ff69b4;
        }

        .announcement-board p {
            color: #777777;
        }

        .grid-card {
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
        }

        .grid-card:hover {
            transform: scale(1.02);
        }

        .card-display {
            height: 220px;
            background-color: #c8add0;
            color: #ffffff;
            font-weight: bold;
        }

        .meta-title {
            color: #ff69b4;
            text-decoration: underline;
        }

        .meta-user {
            color: #777777;
            font-size: 13px;
        }

        .meta-views {
            color: #999999;
            font-size: 12px;
        }

        .floating-add-btn {
            position: fixed;
            bottom: 80px;
            right: 40px;
            width: 60px;
            height: 60px;
            background-color: #ff69b4;
            color: #ffffff;
            text-align: center;
            line-height: 56px;
            font-size: 36px;
            text-decoration: none;
            z-index: 1050;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
        }

        .floating-add-btn:hover {
            color: #ffffff;
            background-color: #e0529c;
        }

        footer {
            border-top: 2px solid #fff0f7;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            color: #777777;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-md navbar-light bg-white sticky-top px-3 py-2">
        <div class="container-fluid d-flex justify-between align-items-center">
            <div class="nav-logo fs-4 fw-bold">Logo</div>
            <input type="text" class="form-control nav-search d-none d-md-block" placeholder="Search bar">
            <div class="d-flex align-items-center gap-3">
                <select class="form-select nav-filter py-1 px-2">
                    <option>Filter</option>
                </select>
                <div class="nav-profile rounded-circle flex-shrink-0"></div>
            </div>
        </div>
    </nav>

    <div class="container my-4" style="max-width: 1200px;">
        <div class="announcement-board text-center rounded mb-4">
            <h2 class="fs-4 fw-bold mb-2">Announcement Board</h2>
            <p class="small mb-0">Interactive & Slide-able</p>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card d-block">
                    <div class="card-display rounded d-flex justify-content-center align-items-center fs-5">Content
                    </div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">100 views</div>
                    </div>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card d-block">
                    <div class="card-display rounded d-flex justify-content-center align-items-center fs-5">Content
                    </div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">250 views</div>
                    </div>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card d-block">
                    <div class="card-display rounded d-flex justify-content-center align-items-center fs-5">Content
                    </div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">500 views</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <a href="register.html" class="floating-add-btn rounded-circle">+</a>

    <footer class="bg-white text-center d-flex align-items-center justify-content-center small">
        &copy; 2510817220002 . Aisha Zwarintyanda.
    </footer>

    <script src="script.js"></script>
</body>

</html>
