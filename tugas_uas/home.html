<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Home Page</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    <style>
        body {
            background-color: #ffffff;
            color: #333333;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        body.page-loaded {
            opacity: 1;
        }

        .navbar {
            border-bottom: 2px solid #ffb7df;
        }

        .nav-logo {
            color: #ff69b4;
            text-decoration: underline;
            text-decoration-color: #ffb7df;
        }

        .nav-search {
            background-color: #fff0f7;
            border: 2px solid #ffb7df;
            width: 35%; /* Disesuaikan agar muat bersama tombol contact us */
        }

        .nav-search:focus {
            background-color: #fff0f7;
            border-color: #ff69b4;
            box-shadow: none;
        }

        /* Styling Tambahan untuk Tombol Contact Us di Header */
        .btn-contact-us {
            border: 2px solid #ffb7df;
            background-color: #fff0f7;
            color: #ff69b4;
            font-weight: 600;
            font-size: 14px;
            transition: all 0.2s ease;
        }

        .btn-contact-us:hover {
            background-color: #ff69b4;
            border-color: #ff69b4;
            color: #ffffff;
        }

        /* Styling Khusus untuk Ikon Modal Pop-up */
        .modal-contact-icon {
            font-size: 1.5rem;
            color: #ff69b4;
        }

        .modal-contact-link {
            text-decoration: none;
            color: #333333;
            font-weight: 500;
        }

        .modal-contact-link:hover {
            color: #ff69b4;
            text-decoration: underline;
        }

        .nav-filter {
            border: 2px solid #ffb7df;
            background-color: #fff0f7;
            color: #777777;
        }

        .nav-profile {
            width: 32px;
            height: 32px;
            background-color: #ffb0fa;
        }

        .announcement-board {
            background-color: #fff0f7;
            border: 2px solid #ffb7df;
            padding: 40px 20px;
        }

        .announcement-board h2 {
            color: #ff69b4;
        }

        .announcement-board p {
            color: #777777;
        }

        .grid-card {
            text-decoration: none;
            color: inherit;
            transition: transform 0.2s ease;
        }

        .grid-card:hover {
            transform: scale(1.02);
        }

        /* MODIFIKASI: Mengubah gambar latar bawaan kelas global menjadi hi.png */
        .card-display {
            height: 220px;
            background-image: url('hi.png');
            background-size: cover;
            background-position: center;
            background-repeat: no-repeat;
            color: #ffffff;
            font-weight: bold;
        }

        .meta-title {
            color: #ff69b4;
            text-decoration: underline;
        }

        .meta-user {
            color: #777777;
            font-size: 13px;
        }

        .meta-views {
            color: #999999;
            font-size: 12px;
        }

        .floating-add-btn {
            position: fixed;
            bottom: 80px;
            right: 40px;
            width: 60px;
            height: 60px;
            background-color: #ff69b4;
            color: #ffffff;
            text-align: center;
            line-height: 56px;
            font-size: 36px;
            text-decoration: none;
            z-index: 1050;
            box-shadow: 0 4px 12px rgba(255, 105, 180, 0.4);
        }

        .floating-add-btn:hover {
            color: #ffffff;
            background-color: #e0529c;
        }

        footer {
            border-top: 2px solid #fff0f7;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            color: #777777;
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-md navbar-light bg-white sticky-top px-3 py-2">
        <div class="container-fluid d-flex justify-between align-items-center">
            <div class="nav-logo fs-4 fw-bold">Logo</div>
            
            <div class="d-none d-md-flex align-items-center justify-content-center flex-grow-1 gap-2">
                <input type="text" class="form-control nav-search" placeholder="Search bar">
                <button class="btn btn-contact-us py-1 px-3 rounded" data-bs-toggle="modal" data-bs-target="#contactModal">
                    Contact Us
                </button>
            </div>

            <div class="d-flex align-items-center gap-3">
                <select class="form-select nav-filter py-1 px-2">
                    <option selected disabled>Filter</option>
                    <option value="art">Art</option>
                    <option value="animation">Animation</option>
                    <option value="gif">GIF</option>
                    <option value="commission">Commission</option>
                </select>
                <div class="nav-profile rounded-circle flex-shrink-0"></div>
            </div>
        </div>
    </nav>

    <div class="modal fade" id="contactModal" tabindex="-1" aria-labelledby="contactModalLabel" aria-hidden="true">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content" style="border-radius: 15px; border: 2px solid #ffb7df;">
                <div class="modal-header bg-white" style="border-bottom: 1px solid #fff0f7;">
                    <h5 class="modal-title fw-bold" id="contactModalLabel" style="color: #ff69b4;">Hubungi Kami</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal" aria-label="Close"></button>
                </div>
                <div class="modal-body p-4">
                    <div class="d-flex align-items-center mb-3 p-3 border rounded bg-light shadow-sm">
                        <i class="bi bi-instagram modal-contact-icon me-3" style="color: #E1306C;"></i>
                        <div>
                            <small class="text-muted d-block" style="font-size: 11px;">Instagram</small>
                            <a href="https://instagram.com/azet" target="_blank" class="modal-contact-link">@azet</a>
                        </div>
                    </div>
                    <div class="d-flex align-items-center p-3 border rounded bg-light shadow-sm">
                        <i class="bi bi-envelope-at modal-contact-icon me-3" style="color: #ff69b4;"></i>
                        <div>
                            <small class="text-muted d-block" style="font-size: 11px;">Email Resmi</small>
                            <a href="mailto:contact.azet@gmail.com" class="modal-contact-link">contact.azet@gmail.com</a>
                        </div>
                    </div>
                </div>
                <div class="modal-footer border-0 pt-0 justify-content-center">
                    <button type="button" class="btn btn-sm text-white px-4 rounded-pill" style="background-color: #ff69b4;" data-bs-dismiss="modal">Tutup</button>
                </div>
            </div>
        </div>
    </div>

    <div class="container my-4" style="max-width: 1200px;">
        <div class="announcement-board text-center rounded mb-4">
            <h2 class="fs-4 fw-bold mb-2">Announcement Board</h2>
            <p class="small mb-0">Interactive & Slide-able</p>
        </div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card d-block">
                    <div class="card-display rounded d-flex justify-content-center align-items-center fs-5"></div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">100 views</div>
                    </div>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card d-block">
                    <div class="card-display rounded d-flex justify-content-center align-items-center fs-5"></div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">250 views</div>
                    </div>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card d-block">
                    <div class="card-display rounded d-flex justify-content-center align-items-center fs-5"></div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">500 views</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <a href="register.html" class="floating-add-btn rounded-circle">+</a>

    <footer class="bg-white text-center d-flex align-items-center justify-content-center small">
        &copy; 2510817220002 . Aisha Zwarintyanda.
    </footer>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/js/bootstrap.bundle.min.js"></script>
    <script src="script.js"></script>
</body>

</html>
