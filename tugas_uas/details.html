<!DOCTYPE html>
<html lang="id">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Details Content</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #ffffff;
            color: #333333;
            min-height: 100vh;
            position: relative;
            padding-bottom: 80px;
            opacity: 0;
            transition: opacity 0.4s ease;
        }

        body.page-loaded {
            opacity: 1;
        }

        .navbar {
            border-bottom: 2px solid #ffb7df;
        }

        .nav-logo {
            color: #ff69b4;
            text-decoration: underline;
            text-decoration-color: #ffb7df;
        }

        .nav-search {
            background-color: #fff0f7;
            border: 2px solid #ffb7df;
            width: 40%;
        }

        .nav-filter {
            border: 2px solid #ffb7df;
            background-color: #fff0f7;
            color: #777777;
        }

        .nav-profile {
            width: 32px;
            height: 32px;
            background-color: #e0b0ff;
        }

        .btn-close-custom {
            text-decoration: none;
            color: #ff69b4;
            font-weight: bold;
        }

        .focus-box {
            width: 100%;
            height: 480px;
            background-color: #c8add0;
            color: #ffffff;
            font-weight: bold;
        }

        .focus-title {
            color: #ff69b4;
            text-decoration: underline;
        }

        .focus-desc {
            color: #777777;
            font-size: 14px;
            line-height: 1.6;
        }

        .focus-views {
            color: #999999;
            font-size: 12px;
        }

        .recommendation-title {
            color: #ff69b4;
        }

        .grid-card {
            text-decoration: none;
            color: inherit;
            display: block;
        }

        .card-display {
            height: 180px;
            background-color: #c8add0;
            color: #ffffff;
            font-weight: bold;
        }

        .meta-title {
            color: #ff69b4;
            text-decoration: underline;
        }

        .meta-user {
            color: #777777;
            font-size: 12px;
        }

        .meta-views {
            color: #999999;
            font-size: 11px;
        }

        footer {
            border-top: 2px solid #fff0f7;
            position: absolute;
            bottom: 0;
            width: 100%;
            height: 60px;
            color: #777777;
        }

        @media (max-width: 768px) {
            .focus-box {
                height: 300px;
            }
        }
    </style>
</head>

<body>

    <nav class="navbar navbar-expand-md navbar-light bg-white px-3 py-2">
        <div class="container-fluid d-flex justify-content-between align-items-center">
            <div class="nav-logo fs-4 fw-bold">Logo</div>
            <input type="text" class="form-control nav-search d-none d-md-block" placeholder="Search bar">
            <div class="d-flex align-items-center gap-3">
                <select class="form-select nav-filter py-1 px-2">
                    <option>Filter</option>
                </select>
                <div class="nav-profile rounded-circle flex-shrink-0"></div>
            </div>
        </div>
    </nav>

    <div class="container my-3" style="max-width: 1200px;">
        <div class="py-2 mb-3">
            <a href="home.html" class="btn-close-custom">&larr; Kembali ke Beranda</a>
        </div>

        <div class="mb-5">
            <div class="focus-box rounded d-flex justify-content-center align-items-center fs-2">Content</div>
            <div class="py-2">
                <div class="focus-title h5 fw-bold mb-2">Username: Title</div>
                <div class="focus-desc mb-2">Description</div>
                <div class="focus-views">1,200 views</div>
            </div>
        </div>

        <div class="recommendation-title h6 fw-bold mb-3">Rekomendasi Konten</div>

        <div class="row g-4 mb-4">
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card">
                    <div class="card-display rounded d-flex justify-content-center align-items-center">Content</div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">85 views</div>
                    </div>
                </a>
            </div>
            <div class="col-12 col-md-4">
                <a href="details.html" class="grid-card">
                    <div class="card-display rounded d-flex justify-content-center align-items-center">Content</div>
                    <div class="pt-2">
                        <div class="meta-title fw-bold mb-1">Title</div>
                        <div class="meta-user mb-1">Username</div>
                        <div class="meta-views">92 views</div>
                    </div>
                </a>
            </div>
        </div>
    </div>

    <footer class="bg-white text-center d-flex align-items-center justify-content-center small">
        &copy; 2026 Copyright System. All Rights Reserved.
    </footer>

    <script src="script.js"></script>
</body>

</html>
