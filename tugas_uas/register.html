<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Register</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #4b4453;
            min-height: 100vh;
            opacity: 0;
            transform: translateX(100px);
            transition: opacity 0.4s ease, transform 0.4s ease;
        }
        body.page-loaded {
            opacity: 1;
            transform: translateX(0);
        }
        .register-box {
            width: 100%;
            max-width: 750px;
            background-color: #ffe6f2;
            padding: 80px 40px;
            box-shadow: 0 4px 15px rgba(0, 0, 0, 0.2);
        }
        .form-control-custom {
            width: 100%;
            max-width: 320px;
            font-size: 14px;
        }
        .btn-submit {
            width: 100%;
            max-width: 320px;
            background-color: #ff69b4;
            color: #ffffff;
            font-size: 14px;
        }
        .btn-submit:hover { background-color: #e0529c; color: #ffffff; }
        .back-link { font-size: 13px; color: #ff69b4; text-decoration: none; }
        .back-link:hover { text-decoration: underline; }
        .h1 {
            color: #694155;
        }
    </style>
</head>
<body class="d-flex justify-content-center align-items-center p-3">

    <div class="register-box rounded d-flex flex-column align-items-center justify-content-center">
        <h1 class="mb-4">Login/Register</h1>
        <div class="mb-3 w-100 d-flex justify-content-center">
            <input type="text" id="username" class="form-control form-control-custom py-2 px-3 border-0" placeholder="Username">
        </div>
        <div class="mb-3 w-100 d-flex justify-content-center">
            <input type="password" id="password" class="form-control form-control-custom py-2 px-3 border-0" placeholder="Password">
        </div>
        
        <button class="btn btn-submit fw-bold py-2 mt-2" id="submit-reg">Submit</button>
        
        <a href="home.html" class="back-link mt-4">&larr; Kembali ke Beranda</a>
    </div>

    <script src="https://code.jquery.com/jquery-3.7.1.min.js"></script>
    <script src="script-jquery.js"></script>
</body>
</html>
